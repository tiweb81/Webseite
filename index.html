<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grün-West Energie Simulator</title>
    <style>
        :root {
            --primary: #008f39; /* Grün-West Grün */
            --bg-color: #f4f7f6;
            --text-dark: #333;
            --box-bg: #ffffff;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
        }
        .simulator-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--box-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2, h3 { color: var(--primary); }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
        .control-group {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="range"] { width: 100%; margin-bottom: 10px; }
        .checkbox-group { margin-top: 10px; }
        .checkbox-group label { font-weight: normal; cursor: pointer; }
        
        .results {
            background: #eaf6ea;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
        }
        .metric {
            font-size: 1.2em;
            margin: 10px 0;
        }
        .metric span { font-weight: bold; color: var(--primary); }
        
        .alert {
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            display: none; /* Versteckt bis gebraucht */
        }
        .alert-warning { background: #ffebee; color: #c62828; border-left: 5px solid #c62828; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 5px solid #2e7d32; }
    </style>
</head>
<body>

<div class="simulator-container">
    <h2>🏡 Grün-West Sanierungs-Fahrplan</h2>
    <p>Simuliere hier deine hybride Lösung aus Ökonomie und Ökologie für die nächsten Jahre.</p>

    <div class="grid">
        <div>
            <div class="control-group">
                <label for="budget">Verfügbares Budget: <span id="budget-val">50.000</span> €</label>
                <input type="range" id="budget" min="10000" max="100000" step="5000" value="50000">
                
                <label for="jahre" style="margin-top:15px;">Betrachtungszeitraum: <span id="jahre-val">20</span> Jahre</label>
                <input type="range" id="jahre" min="5" max="30" step="1" value="20">
            </div>

            <div class="control-group">
                <h3>Maßnahmen</h3>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="huelle"> 🧱 Thermische Hülle (Dämmung/Fenster)</label><br>
                    <label><input type="checkbox" id="technik"> ☀️ Anlagentechnik (Wärmepumpe/Solar)</label>
                </div>
            </div>
        </div>

        <div>
            <div class="results">
                <h3>📊 Deine Ergebnisse</h3>
                <div class="metric">Investition: <span id="res-invest">0</span> €</div>
                <div class="metric">Ersparnis pro Jahr: <span id="res-savings">0</span> €</div>
                <div class="metric">CO2-Reduktion: <span id="res-co2">0</span> t / Jahr</div>
                <hr>
                <div class="metric">Amortisation in: <span id="res-amortisation">-</span></div>
            </div>

            <div id="budget-alert" class="alert"></div>
            <div id="klaus-tipp" class="alert alert-success" style="display:none; margin-top: 10px;"></div>
        </div>
    </div>
</div>

<script>
    // Elemente abgreifen
    const elBudget = document.getElementById('budget');
    const elJahre = document.getElementById('jahre');
    const elHuelle = document.getElementById('huelle');
    const elTechnik = document.getElementById('technik');
    
    const valBudget = document.getElementById('budget-val');
    const valJahre = document.getElementById('jahre-val');
    
    const resInvest = document.getElementById('res-invest');
    const resSavings = document.getElementById('res-savings');
    const resCo2 = document.getElementById('res-co2');
    const resAmortisation = document.getElementById('res-amortisation');
    
    const alertBox = document.getElementById('budget-alert');
    const klausTipp = document.getElementById('klaus-tipp');

    // Basiswerte
    const baseEnergyCost = 4500; 

    function formatNumber(num) {
        return num.toLocaleString('de-DE');
    }

    function calculate() {
        let budget = parseInt(elBudget.value);
        let jahre = parseInt(elJahre.value);
        
        valBudget.innerText = formatNumber(budget);
        valJahre.innerText = jahre;

        let invest = 0;
        let savings = 0;
        let co2 = 0;

        // Logik
        if(elHuelle.checked) { invest += 30000; savings += 1800; co2 += 3.0; }
        if(elTechnik.checked) { invest += 25000; savings += 1700; co2 += 4.0; }

        // Ausgeben
        resInvest.innerText = formatNumber(invest);
        resSavings.innerText = formatNumber(savings);
        resCo2.innerText = co2.toFixed(1);

        // Budget Warnung
        alertBox.style.display = 'block';
        if(invest > budget) {
            alertBox.className = 'alert alert-warning';
            alertBox.innerHTML = `⚠️ <b>Budget überschritten!</b> Die Kosten liegen bei ${formatNumber(invest)} € (Budget: ${formatNumber(budget)} €).`;
        } else if (invest > 0) {
            alertBox.className = 'alert alert-success';
            alertBox.innerHTML = `✅ <b>Passt ins Budget!</b>`;
        } else {
            alertBox.style.display = 'none';
        }

        // Amortisation & Klaus Tipp
        klausTipp.style.display = 'none';
        if(invest > 0) {
            let amortisationTime = invest / savings;
            resAmortisation.innerText = amortisationTime.toFixed(1) + " Jahren";
            
            klausTipp.style.display = 'block';
            if(amortisationTime <= jahre) {
                klausTipp.innerHTML = "<b>Klaus sagt:</b> <i>Das ist eine echte Hybrid-Lösung. Ökonomisch und ökologisch sinnvoll für diesen Zeitraum!</i>";
                klausTipp.className = 'alert alert-success';
            } else {
                klausTipp.innerHTML = "<b>Klaus sagt:</b> <i>Achtung, das rechnet sich in deinem Zeitrahmen noch nicht komplett. Wir sollten den Fahrplan anpassen.</i>";
                klausTipp.className = 'alert alert-warning';
            }
        } else {
            resAmortisation.innerText = "-";
        }
    }

    // Event Listener anfügen
    elBudget.addEventListener('input', calculate);
    elJahre.addEventListener('input', calculate);
    elHuelle.addEventListener('change', calculate);
    elTechnik.addEventListener('change', calculate);

    // Initiale Berechnung
    calculate();
</script>

</body>
</html>
